[pytest]
# Pytest configuration for doa project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    property: Property-based tests using Hypothesis (may take longer to run)
    integration: Integration tests requiring external services
    slow: Tests that take significant time to run
    asyncio: Async tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Asyncio configuration
asyncio_mode = auto

# Coverage options (when using --cov)
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */.venv/*
    */site-packages/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
